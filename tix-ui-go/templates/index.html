<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tix</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); margin: 0; padding: 0;
    line-height: 1.5;
  }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--text-muted); font-weight: 400; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }

  /* Status badge */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .badge-open        { background: #1a3a2a; color: var(--green); }
  .badge-in-progress { background: #2a2a1a; color: var(--yellow); }
  .badge-done        { background: #1a2a3a; color: var(--accent); }
  .badge-closed      { background: #1a1a2a; color: var(--purple); }
  .badge-on-hold     { background: #2a1a1a; color: var(--red); }

  /* Priority indicator */
  .priority { font-weight: 600; }
  .priority-0 { color: var(--text-muted); }
  .priority-1 { color: var(--green); }
  .priority-2 { color: var(--yellow); }
  .priority-3 { color: #ffa657; }
  .priority-4 { color: var(--red); }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 8px 12px; font-size: 12px; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sorted::after { content: " \u25B2"; font-size: 10px; }
  thead th.sorted.desc::after { content: " \u25BC"; }
  tbody td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  tbody tr:hover { background: var(--surface); }
  .id-col { color: var(--text-muted); font-family: monospace; font-size: 12px; }
  .type-col { color: var(--text-muted); font-size: 13px; }

  /* Create form */
  .create-form {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; margin-bottom: 24px;
  }
  .create-form summary {
    cursor: pointer; font-weight: 600; font-size: 14px; color: var(--accent);
    user-select: none;
  }
  .form-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .form-row input, .form-row select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 10px; border-radius: 6px; font-size: 14px;
  }
  .form-row input[type="text"] { flex: 1; min-width: 200px; }
  .form-row select { min-width: 100px; }
  button {
    background: var(--accent); color: #000; border: none; padding: 6px 16px;
    border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Connection indicator */
  .ws-status {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    margin-left: 8px; vertical-align: middle;
  }
  .ws-connected { background: var(--green); }
  .ws-disconnected { background: var(--red); }

  .empty { text-align: center; color: var(--text-muted); padding: 48px 0; }
  .count { color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>tix <span>ui</span> <span class="ws-status ws-disconnected" id="ws-dot" title="WebSocket"></span></h1>
  <span class="count" id="count"></span>
</header>
<div class="container">
  <details class="create-form">
    <summary>+ New Ticket</summary>
    <form id="create-form" onsubmit="createTicket(event)">
      <div class="form-row">
        <input type="text" id="new-title" placeholder="Ticket title" required>
        <select id="new-type">
          <option value="task">task</option>
          <option value="bug">bug</option>
          <option value="feature">feature</option>
          <option value="epic">epic</option>
          <option value="chore">chore</option>
        </select>
        <select id="new-priority">
          <option value="1">P1</option>
          <option value="2">P2</option>
          <option value="3">P3</option>
          <option value="0">P0</option>
          <option value="4">P4</option>
        </select>
        <button type="submit" id="create-btn">Create</button>
      </div>
    </form>
  </details>

  <table>
    <thead>
      <tr>
        <th data-key="id" style="width:60px">ID</th>
        <th data-key="title">Title</th>
        <th data-key="status" style="width:110px">Status</th>
        <th data-key="type" style="width:80px">Type</th>
        <th data-key="priority" style="width:60px" class="sorted">Pri</th>
      </tr>
    </thead>
    <tbody id="ticket-body"></tbody>
  </table>
  <div class="empty" id="empty" style="display:none">No tickets found. Create one above or check your tickets directory.</div>
</div>

<script>
let tickets = [];
let sortKey = "priority";
let sortDesc = true;

// --- Fetch & render ---
async function loadTickets() {
  try {
    const res = await fetch("/api/tickets");
    tickets = await res.json();
    render();
  } catch (e) {
    console.error("Failed to load tickets:", e);
  }
}

function render() {
  const tbody = document.getElementById("ticket-body");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");

  const sorted = [...tickets].sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (typeof va === "string") va = va.toLowerCase();
    if (typeof vb === "string") vb = vb.toLowerCase();
    if (va < vb) return sortDesc ? 1 : -1;
    if (va > vb) return sortDesc ? -1 : 1;
    return 0;
  });

  count.textContent = tickets.length + " ticket" + (tickets.length !== 1 ? "s" : "");

  if (sorted.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";

  tbody.innerHTML = sorted.map(t => `
    <tr>
      <td class="id-col">${esc(t.id)}</td>
      <td>${esc(t.title)}</td>
      <td><span class="badge badge-${t.status}">${esc(t.status)}</span></td>
      <td class="type-col">${esc(t.type)}</td>
      <td class="priority priority-${t.priority}">P${t.priority}</td>
    </tr>
  `).join("");
}

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// --- Sorting ---
document.querySelectorAll("thead th[data-key]").forEach(th => {
  th.addEventListener("click", () => {
    const key = th.dataset.key;
    if (sortKey === key) { sortDesc = !sortDesc; }
    else { sortKey = key; sortDesc = key === "priority"; }
    document.querySelectorAll("thead th").forEach(h => h.classList.remove("sorted", "desc"));
    th.classList.add("sorted");
    if (sortDesc) th.classList.add("desc");
    render();
  });
});

// --- Create ---
async function createTicket(e) {
  e.preventDefault();
  const btn = document.getElementById("create-btn");
  btn.disabled = true;
  try {
    const res = await fetch("/api/tickets", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        title: document.getElementById("new-title").value,
        type: document.getElementById("new-type").value,
        priority: document.getElementById("new-priority").value,
      }),
    });
    if (!res.ok) {
      const text = await res.text();
      alert("Create failed: " + text);
      return;
    }
    document.getElementById("new-title").value = "";
    // WebSocket will trigger reload, but also fetch immediately
    await loadTickets();
  } finally {
    btn.disabled = false;
  }
}

// --- WebSocket ---
function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const ws = new WebSocket(proto + "//" + location.host + "/ws");
  const dot = document.getElementById("ws-dot");

  ws.onopen = () => {
    dot.className = "ws-status ws-connected";
    dot.title = "Connected";
  };
  ws.onclose = () => {
    dot.className = "ws-status ws-disconnected";
    dot.title = "Disconnected - reconnecting...";
    setTimeout(connectWS, 2000);
  };
  ws.onmessage = (e) => {
    if (e.data === "reload") loadTickets();
  };
}

// --- Init ---
loadTickets();
connectWS();
</script>
</body>
</html>
