name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
          - os: darwin
            arch: amd64
          - os: linux
            arch: arm64
          - os: linux
            arch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tix-ui/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: tix-server/go.sum

      - name: Build embedded UI
        run: |
          cd tix-ui
          npm ci
          npm run build:go
          mkdir -p ../tix-server/ui
          rm -rf ../tix-server/ui/*
          cp -r dist-go/. ../tix-server/ui/
          if [ -f ../tix-server/ui/index.go.html ]; then
            mv ../tix-server/ui/index.go.html ../tix-server/ui/index.html
          fi
          [ -f ../tix-server/ui/index.html ] || { echo "ERROR: index.html missing from ui/ after build"; exit 1; }

      - name: Cross-compile binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          TAG: ${{ github.ref_name }}
        run: |
          cd tix-server
          mkdir -p ../dist
          go build -trimpath \
            -ldflags "-s -w -X main.buildVersion=${TAG}" \
            -o tix .
          if [ "${GOOS}" = "darwin" ]; then
            codesign --force --sign - tix
          fi
          tar -czf "../dist/tix-${GOOS}-${GOARCH}.tar.gz" tix
          rm tix

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tix-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/tix-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum tix-*.tar.gz > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tix-*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
